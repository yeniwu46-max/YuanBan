services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yuanbanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yuanbanban}
      POSTGRES_DB: ${POSTGRES_DB:-yuanbanban}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yuanbanban}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  emqx:
    image: emqx/emqx:5.8.3
    ports:
      - "1883:1883"
      - "18083:18083"
    environment:
      EMQX_ALLOW_ANONYMOUS: "true"
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-yuanbanban}:${POSTGRES_PASSWORD:-yuanbanban}@postgres:5432/${POSTGRES_DB:-yuanbanban}
      REDIS_URL: redis://redis:6379/0
      MQTT_HOST: emqx
      MQTT_PORT: 1883
      MQTT_TOPIC_PREFIX: yuanbanban
      SOS_DEDUP_SECONDS: 300
      RUN_SEED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy

volumes:
  postgres_data:
